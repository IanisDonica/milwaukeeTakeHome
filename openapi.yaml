openapi: 3.0.4
info:
  title: Milwaukee Take home API Server
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Local development server

components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "API Token that can be retrieved from /auth/token/"

  schemas:
    Tool:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            manufactured_date:
              type: string
              format: date
            assigned_to:
              type: string
              nullable: true
              description: Included only for warehouse user in the central list.

security:
  - TokenAuth: []

paths:
  /auth/token/:
    post:
      summary: Authenticate User
      description: Logs in a user and generates a new unique token. Inactivates any previous tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: demo
                password:
                  type: string
                  example: demopass
                language:
                  type: string
                  description: Optional language for error messages (en, de, ro). Defaults to en.
                  example: en
      responses:
        '200':
          description: Successful authentication. Returns the token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    format: uuid
        '400':
          description: Bad request (missing credentials or invalid JSON).
        '401':
          description: Unauthorized (invalid credentials).

  /transfer/:
    post:
      summary: Transfer Tools
      description: Transfers ownership of specific tools to the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tools
              properties:
                tools:
                  type: array
                  items:
                    type: string
                  description: List of tool names to transfer.
                  example: ["M18 FUEL 1/2 in. Hammer Drill/Driver"]
                language:
                  type: string
                  description: Optional language for response messages.
                  example: en
      responses:
        '200':
          description: Transfer successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tools have been successfully transferred to your account.
        '400':
          description: Bad request (invalid JSON or tools list).
        '401':
          description: Unauthorized (missing or invalid token).
        '500':
          description: Internal server error.

  /tools/:
    get:
      summary: View Tools
      description: Returns tools assigned to the warehouse (central) and the authenticated user (self). Warehouse user sees all tools in 'central'.
      # Security is inherited from the global setting
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
          description: Optional language for error messages.
      responses:
        '200':
          description: Successful retrieval of tools.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      user_role:
                        type: string
                        example: field_user
                  data:
                    type: object
                    properties:
                      central:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tool'
                      self:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tool'
        '401':
          description: Unauthorized (missing or invalid token).
        '404':
          description: Warehouse user not found.
        '500':
          description: Internal server error.

  /inspect/:
    post:
      summary: Inspect Tool History
      description: Returns the transfer history for a specific tool. Only accessible by the warehouse user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tool_name
              properties:
                tool_name:
                  type: string
                  example: M18 FUEL 1/2 in. Hammer Drill/Driver
                language:
                  type: string
                  description: Optional language.
                  example: en
      responses:
        '200':
          description: Successful inspection.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tool_name:
                    type: string
                  transfer_history:
                    type: array
                    items:
                      type: object
                      properties:
                        transferred_to_user:
                          type: string
                        token_used:
                          type: string
                          format: uuid
                        timestamp:
                          type: string
                          format: date-time
        '400':
          description: Bad request (missing tool name).
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden (not a warehouse user).
        '404':
          description: Tool not found.
        '500':
          description: Internal server error.

  /logs/:
    get:
      summary: View Request Logs
      description: Returns a paginated list of all API request logs. Only accessible by the warehouse user.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for pagination.
        - name: language
          in: query
          required: false
          schema:
            type: string
          description: Optional language.
      responses:
        '200':
          description: Successful retrieval of logs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  num_pages:
                    type: integer
                  current_page:
                    type: integer
                  next:
                    type: integer
                    nullable: true
                  previous:
                    type: integer
                    nullable: true
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        user:
                          type: string
                        token:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        action:
                          type: string
                        successful:
                          type: boolean
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden (not warehouse).